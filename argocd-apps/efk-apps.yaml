# efk-apps.yaml - Official Stack (Elasticsearch, Fluentd, Kibana)
---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
# 1. Elasticsearch Official (Repo: helm.elastic.co)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: argocd
spec:
  project: default
  source:
    chart: elasticsearch
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        clusterName: "elasticsearch"
        nodeGroup: "master"
        replicas: 1
        minimumMasterNodes: 1
        # Lab Mode: Tắt bảo mật để các thành phần kết nối HTTP nhanh
        xpack.security.enabled: false
        # Cấp đất local-path của bạn
        persistence:
          enabled: true
        volumeClaimTemplate:
          storageClassName: "local-path"
          resources:
            requests:
              storage: 5Gi
        resources:
          requests: { cpu: "500m", memory: "2Gi" }
          limits: { cpu: "1000m", memory: "2Gi" }
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]

---
# 2. Fluentd Official (Repo: fluent.github.io)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluentd
  namespace: argocd
spec:
  project: default
  source:
    chart: fluentd
    repoURL: https://fluent.github.io/helm-charts
    targetRevision: 0.5.0
    helm:
      values: |
        # Image chính chủ từ Docker Hub (fluent/fluentd-kubernetes-daemonset)
        image:
          repository: fluent/fluentd-kubernetes-daemonset
          tag: v1.16-debian-elasticsearch7-1 
        env:
          - name: FLUENT_ELASTICSEARCH_HOST
            value: "elasticsearch-master"
          - name: FLUENT_ELASTICSEARCH_PORT
            value: "9200"
          - name: FLUENT_ELASTICSEARCH_SCHEME
            value: "http"
        resources:
          requests: { cpu: "100m", memory: "200Mi" }
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }

---
# 3. Kibana Official (Repo: helm.elastic.co)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: argocd
spec:
  project: default
  source:
    chart: kibana
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        elasticsearchHosts: "http://elasticsearch-master:9200"
        # Tắt check cert để chạy HTTP
        kibanaConfig:
          kibana.yml: |
            server.ssl.enabled: false
            elasticsearch.ssl.verificationMode: none
        resources:
          requests: { cpu: "500m", memory: "1Gi" }
        service:
          type: NodePort
          nodePort: 30601
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }