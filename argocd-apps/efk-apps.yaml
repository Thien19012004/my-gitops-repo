# efk-apps.yaml - Official Stack 100% (No Bitnami, No SSL)
---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
# 1. Elasticsearch Official (docker.elastic.co)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: argocd
spec:
  project: default
  source:
    chart: elasticsearch
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        clusterName: "elasticsearch"
        nodeGroup: "master"
        replicas: 1
        minimumMasterNodes: 1
        # ÉP DÙNG IMAGE CHÍNH CHỦ - KHÔNG DÙNG BITNAMI
        image: "docker.elastic.co/elasticsearch/elasticsearch"
        imageTag: "8.5.1"
        # TẮT SẠCH BẢO MẬT
        xpack.security.enabled: false
        createCert: false
        rbac:
          create: true
        serviceAccount:
          create: true
          name: "elasticsearch-master"
        persistence:
          enabled: true
        volumeClaimTemplate:
          storageClassName: "local-path"
          resources:
            requests:
              storage: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, Replace=true]

---
# 2. Fluentd Official (docker.io/fluent)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluentd
  namespace: argocd
spec:
  project: default
  source:
    chart: fluentd
    repoURL: https://fluent.github.io/helm-charts
    targetRevision: 0.5.0
    helm:
      values: |
        # Dùng image chính chủ Fluentd, không dùng Bitnami
        image:
          repository: fluent/fluentd-kubernetes-daemonset
          tag: v1.16-debian-elasticsearch7-1
        serviceAccount:
          create: true
          name: "fluentd-forwarder"
        rbac:
          create: true
        elasticsearch:
          host: "elasticsearch-master"
          port: 9200
          scheme: "http"
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }

---
# 3. Kibana Official (docker.elastic.co)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: argocd
spec:
  project: default
  source:
    chart: kibana
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        # ÉP DÙNG IMAGE CHÍNH CHỦ
        image: "docker.elastic.co/kibana/kibana"
        imageTag: "8.5.1"
        elasticsearchHosts: "http://elasticsearch-master:9200"
        # Tắt toàn bộ Security/SSL
        protocol: http
        kibanaConfig:
          kibana.yml: |
            server.ssl.enabled: false
            xpack.security.enabled: false
        # Xóa các cài đặt Cert mặc định gây lỗi FailedMount
        extraVolumes: []
        extraVolumeMounts: []
        # TẮT CÁI JOB PRE-INSTALL GÂY LỖI
        automountServiceAccountToken: true
        serviceAccount:
          create: true
        service:
          type: NodePort
          nodePort: 30601
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }