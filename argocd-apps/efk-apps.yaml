# efk-apps.yaml - Bản "Fix dứt điểm lỗi 1 handler"
---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: argocd
spec:
  project: default
  source:
    chart: elasticsearch
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        clusterName: "elasticsearch"
        nodeGroup: "master"
        replicas: 1
        extraEnvs:
          - name: discovery.type
            value: "single-node"
          - name: xpack.security.enabled
            value: "false"
        # XÓA BỎ HANDLER CŨ VÀ DÙNG TCP SOCKET MỚI
        readinessProbe:
          exec: null  # <--- DÒNG NÀY ĐỂ XÓA LỖI "MORE THAN 1 HANDLER"
          tcpSocket:
            port: 9200
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          exec: null  # <--- XÓA LUÔN LIVENESS HANDLER MẶC ĐỊNH
          tcpSocket:
            port: 9200
          initialDelaySeconds: 60
        createCert: false
        persistence:
          enabled: true
        volumeClaimTemplate:
          storageClassName: "local-path"
          resources:
            requests:
              storage: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [Replace=true]

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluentd
  namespace: argocd
spec:
  project: default
  source:
    chart: fluentd
    repoURL: https://fluent.github.io/helm-charts
    targetRevision: 0.5.0
    helm:
      values: |
        image:
          repository: fluent/fluentd-kubernetes-daemonset
          tag: v1.16-debian-elasticsearch7-1
        serviceAccount: { create: true, name: "fluentd-forwarder" }
        rbac: { create: true }
        elasticsearch:
          host: "elasticsearch-master"
          port: 9200
          scheme: "http"
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy: { automated: { prune: true, selfHeal: true } }

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: argocd
spec:
  project: default
  source:
    chart: kibana
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        elasticsearchHosts: "http://elasticsearch-master:9200"
        protocol: http
        kibanaConfig:
          kibana.yml: |
            server.ssl.enabled: false
            xpack.security.enabled: false
        serviceAccount: { create: true }
        service:
          type: NodePort
          nodePort: 30601
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy: { automated: { prune: true, selfHeal: true } }