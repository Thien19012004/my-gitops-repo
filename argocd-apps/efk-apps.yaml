# efk-apps.yaml
---
# 1. Project/Namespace cho Logging (Nếu chưa có)
apiVersion: v1
kind: Namespace
metadata:
  name: logging
# 2. Application: Elasticsearch (Lưu trữ Log)
# efk-apps.yaml (Bản Fix lỗi Mount và Image)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: argocd
spec:
  project: default
  source:
    chart: elasticsearch
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 19.15.0 # Dùng bản cụ thể ổn định
    helm:
      values: |
        global:
          storageClass: "local-path"
        master:
          replicaCount: 1
          resources:
            limits: { memory: 2Gi }
            requests: { cpu: 500m, memory: 2Gi }
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluentd
  namespace: argocd
spec:
  project: default
  source:
    chart: fluentd
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 6.4.0
    helm:
      values: |
        aggregator:
          enabled: false
        forwarder:
          enabled: true
          # XÓA DÒNG configMap: fluentd-conf ĐI ĐỂ NÓ DÙNG MẶC ĐỊNH
        elasticsearch:
          host: elasticsearch-master.logging.svc.cluster.local
          port: 9200
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: argocd
spec:
  project: default
  source:
    chart: kibana
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 10.3.0
    helm:
      values: |
        elasticsearch:
          hosts: [ "elasticsearch-master.logging.svc.cluster.local" ]
          port: 9200
        service:
          type: NodePort
          ports: { http: 5601 }
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }