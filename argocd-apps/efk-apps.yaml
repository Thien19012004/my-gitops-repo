# efk-apps.yaml - Official Full Stack (Fixed Destination Error)
---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
# 1. Elasticsearch Official
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: argocd
spec:
  project: default
  source:
    chart: elasticsearch
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        clusterName: "elasticsearch"
        nodeGroup: "master"
        replicas: 1
        minimumMasterNodes: 1
        xpack.security.enabled: false
        xpack.security.http.ssl.enabled: false
        xpack.security.transport.ssl.enabled: false
        createCert: false 
        persistence:
          enabled: true
        volumeClaimTemplate:
          storageClassName: "local-path"
          resources:
            requests:
              storage: 5Gi
        resources:
          requests: { cpu: "500m", memory: "2Gi" }
          limits: { cpu: "1000m", memory: "2Gi" }
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]

---
# 2. Fluentd Official (Đã fix lỗi thiếu destination)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluentd
  namespace: argocd
spec:
  project: default
  source:
    chart: fluentd
    repoURL: https://fluent.github.io/helm-charts
    targetRevision: 0.5.0
    helm:
      values: |
        variant: elasticsearch
        elasticsearch:
          host: "elasticsearch-master"
          port: 9200
          scheme: "http"
        resources:
          requests: { cpu: "100m", memory: "200Mi" }
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }

---
# 3. Kibana Official
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: argocd
spec:
  project: default
  source:
    chart: kibana
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        elasticsearchHosts: "http://elasticsearch-master:9200"
        protocol: http
        elasticsearch:
          ssl:
            verificationMode: none
        kibanaConfig:
          kibana.yml: |
            server.ssl.enabled: false
            elasticsearch.ssl.verificationMode: none
            xpack.security.enabled: false
        extraVolumes: []
        extraVolumeMounts: []
        resources:
          requests: { cpu: "500m", memory: "1Gi" }
        service:
          type: NodePort
          nodePort: 30601
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }