# efk-apps.yaml - Official Stack (Fixed RBAC & ServiceAccount)
---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
# 1. Elasticsearch Official
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: argocd
spec:
  project: default
  source:
    chart: elasticsearch
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        clusterName: "elasticsearch"
        nodeGroup: "master"
        # TẠO SERVICE ACCOUNT CHO ELASTIC
        rbac:
          create: true
        serviceAccount:
          create: true
          name: "elasticsearch-master"
        replicas: 1
        minimumMasterNodes: 1
        xpack.security.enabled: false
        xpack.security.http.ssl.enabled: false
        xpack.security.transport.ssl.enabled: false
        createCert: false 
        persistence:
          enabled: true
        volumeClaimTemplate:
          storageClassName: "local-path"
          resources:
            requests:
              storage: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]

---
# 2. Fluentd Official
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluentd
  namespace: argocd
spec:
  project: default
  source:
    chart: fluentd
    repoURL: https://fluent.github.io/helm-charts
    targetRevision: 0.5.0
    helm:
      values: |
        variant: elasticsearch
        # TẠO SERVICE ACCOUNT CHO FLUENTD (Cực kỳ quan trọng để nó đọc log Pod)
        serviceAccount:
          create: true
          name: "fluentd-forwarder"
        rbac:
          create: true
        elasticsearch:
          host: "elasticsearch-master"
          port: 9200
          scheme: "http"
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }

---
# 3. Kibana Official
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: argocd
spec:
  project: default
  source:
    chart: kibana
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        # TẠO SERVICE ACCOUNT CHO KIBANA
        serviceAccount:
          create: true
        rbac:
          create: true
        elasticsearchHosts: "http://elasticsearch-master:9200"
        protocol: http
        kibanaConfig:
          kibana.yml: |
            server.ssl.enabled: false
            xpack.security.enabled: false
        service:
          type: NodePort
          nodePort: 30601
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }