# efk-apps.yaml - Official Stack (Forced HTTP Mode)
---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: argocd
spec:
  project: default
  source:
    chart: elasticsearch
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        clusterName: "elasticsearch"
        nodeGroup: "master"
        replicas: 1
        # ÉP TẮT SSL Ở MỨC BIẾN MÔI TRƯỜNG (QUAN TRỌNG NHẤT)
        extraEnvs:
          - name: xpack.security.enabled
            value: "false"
          - name: xpack.security.http.ssl.enabled
            value: "false"
          - name: xpack.security.transport.ssl.enabled
            value: "false"
        createCert: false 
        rbac: { create: true }
        serviceAccount: { create: true, name: "elasticsearch-master" }
        persistence:
          enabled: true
        volumeClaimTemplate:
          storageClassName: "local-path"
          resources:
            requests: { storage: 5Gi }
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, Replace=true]

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluentd
  namespace: argocd
spec:
  project: default
  source:
    chart: fluentd
    repoURL: https://fluent.github.io/helm-charts
    targetRevision: 0.5.0
    helm:
      values: |
        variant: elasticsearch
        serviceAccount: { create: true, name: "fluentd-forwarder" }
        rbac: { create: true }
        elasticsearch:
          host: "elasticsearch-master"
          port: 9200
          scheme: "http" # Buộc dùng http
          ssl_verify: false
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy: { automated: { prune: true, selfHeal: true } }

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: argocd
spec:
  project: default
  source:
    chart: kibana
    repoURL: https://helm.elastic.co
    targetRevision: 8.5.1
    helm:
      values: |
        elasticsearchHosts: "http://elasticsearch-master:9200"
        protocol: http
        kibanaConfig:
          kibana.yml: |
            server.ssl.enabled: false
            xpack.security.enabled: false
            elasticsearch.ssl.verificationMode: none
        extraVolumes: []
        extraVolumeMounts: []
        serviceAccount: { create: true }
        service:
          type: NodePort
          nodePort: 30601
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy: { automated: { prune: true, selfHeal: true } }