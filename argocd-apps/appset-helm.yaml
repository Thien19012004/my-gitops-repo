apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-trigger-set
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: local-cluster
            url: https://kubernetes.default.svc
            version: 0.1.6
  template:
    metadata:
      name: '{{cluster}}-todo-app'
    spec:
      project: default
      source:
        repoURL: https://jfrog.ddthien.id.vn/artifactory/helm-local
        chart: todo-app
        targetRevision: '{{version}}'
        helm:
          passCredentials: true
      destination:
        server: '{{url}}'
        namespace: todo-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true