apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-trigger-set
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: local-cluster
            url: https://kubernetes.default.svc
  template:
    metadata:
      name: '{{cluster}}-todo-app'
      annotations:
        argocd-image-updater.argoproj.io/image-list: todo-app=thien19012004/todo-app
        argocd-image-updater.argoproj.io/todo-app.helm.image-spec: image.tag
        argocd-image-updater.argoproj.io/todo-app.update-strategy: latest
        argocd-image-updater.argoproj.io/todo-app.pull-secret: secret:argocd/dockerhub-creds
        argocd-image-updater.argoproj.io/write-back-method: argocd
    spec:
      project: default
      source:
        repoURL: https://jfrog.ddthien.id.vn/artifactory/helm-local
        chart: todo-app
        targetRevision: '*'
        helm:
          passCredentials: true
      destination:
        server: '{{url}}'
        namespace: todo-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
  ignoreApplicationDifferences:
  - jsonPointers:
    - /spec/source/helm/parameters